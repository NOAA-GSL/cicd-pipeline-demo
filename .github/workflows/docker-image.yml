name: Build, Test, and Push Docker Image

# =============================================================================
# TRIGGER CONFIGURATION
# This workflow runs on:
#   - Every push to 'master' branch (for deployment)
#   - Every pull request targeting 'master' (for validation)
# =============================================================================
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ===========================================================================
  # JOB 1: TEST
  # Purpose: Run unit tests inside a container before building
  # Runs on: Every push AND every pull request
  # Why: Catch bugs early, before they reach master branch
  # ===========================================================================
  test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Run tests INSIDE a container (not on the host)
      # This ensures tests run in the same environment as production
      - name: Run tests in container
        run: docker compose --profile testing run --rm test

  # ===========================================================================
  # JOB 2: LINT (Code Quality)
  # Purpose: Check code style and potential bugs
  # Runs on: Every push AND every pull request
  # Why: Maintain code quality and catch issues early
  # ===========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run linting in container
        run: docker compose --profile testing run --rm lint

  # ===========================================================================
  # JOB 3: BUILD AND PUSH
  # Purpose: Build Docker image and push to GitHub Container Registry
  # Runs on: ONLY on push to master, AFTER tests and lint pass
  # Why: Only deploy code that has passed all quality gates
  # ===========================================================================
  build-and-push:
    needs: [test, lint]  # Wait for BOTH test and lint to pass
    runs-on: ubuntu-latest
    
    # Only run this job on push to master (not on PRs)
    # PRs should only test, not deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    # Permissions required for this job:
    permissions:
      contents: read      # Read repository contents
      packages: write     # Push to GitHub Packages (GHCR)
      id-token: write     # Required for signing (optional, for SLSA provenance)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Buildx for advanced Docker builds (multi-platform, caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate with GitHub Container Registry
      # GITHUB_TOKEN is automatically provided by GitHub Actions
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags and labels for the Docker image
      # This creates multiple tags: sha, branch, version, latest
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cicd-pipeline-demo
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build and push the Docker image with caching
      # cache-from/to uses GitHub Actions cache for faster builds
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verify the container actually works before considering success
      - name: Test container health
        run: |
          docker compose up -d web
          sleep 5
          curl --fail http://localhost:8112/health || exit 1
          docker compose down